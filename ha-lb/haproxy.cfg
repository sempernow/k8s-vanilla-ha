#---------------------------------------------------------------------
# Example configuration for a possible web application.  See the
# full configuration options online.
#
#   http://www.haproxy.org/download/2.9/doc/configuration.txt
#
#---------------------------------------------------------------------

# Global settings
global
    # to have these messages end up in /var/log/haproxy.log you will
    # need to:
    #
    # 1) configure syslog to accept network log events.  This is done
    #    by adding the '-r' option to the SYSLOGD_OPTIONS in
    #    /etc/sysconfig/rsyslog
    #
    # 2) configure local2 events to go to the /var/log/haproxy.log
    #   file. A line like the following can be added to
    #   /etc/sysconfig/rsyslog
    #
    #    local2.*                       /var/log/haproxy.log
    #
    log         127.0.0.1 local2

    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     4000
    user        haproxy
    group       haproxy
    daemon

    # turn on stats unix socket
    stats socket /var/lib/haproxy/stats

# Layer 4 (TCP) mode
defaults
    mode                    tcp
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    option forwardfor       except 127.0.0.0/8
    option                  redispatch
    retries                 3
    timeout queue           50000
    timeout connect         5000
    timeout client          50000
    timeout server          50000
    timeout http-request    10000
    timeout http-keep-alive 10000
    timeout check           10000
    maxconn                 3000

# Frontend for K8s API Server
frontend api
    bind *:8443
    option tcplog
    default_backend api

# Backend for K8s API Server
backend api
    option httpchk GET /healthz
    http-check expect status 200
    option ssl-hello-chk
    balance roundrobin
    default-server inter 10s downinter 5s rise 2 fall 2 slowstart 60s maxconn 250 maxqueue 256 weight 100
    server LB_1_FQDN LB_1_IPV4:6443 check
    server LB_2_FQDN LB_2_IPV4:6443 check

# Frontend for K8s Ingress by HTTP
frontend ingress-http
    bind *:80
    option tcplog
    default_backend ingress-http
    
# Backend for K8s Ingress by HTTP
backend ingress-http
    option ssl-hello-chk
    balance roundrobin
    default-server inter 10s downinter 5s rise 2 fall 2 slowstart 60s maxconn 250 maxqueue 256 weight 100
    server LB_1_FQDN LB_1_IPV4:80 check
    server LB_2_FQDN LB_2_IPV4:80 check

# Frontend for K8s Ingress HTTPS
frontend ingress-https
    bind *:443
    option tcplog
    default_backend ingress-https
    
# Backend for K8s Ingress HTTPS
backend ingress-https
    option ssl-hello-chk
    balance roundrobin
    default-server inter 10s downinter 5s rise 2 fall 2 slowstart 60s maxconn 250 maxqueue 256 weight 100
    server LB_1_FQDN LB_1_IPV4:443 check
    server LB_2_FQDN LB_2_IPV4:443 check

